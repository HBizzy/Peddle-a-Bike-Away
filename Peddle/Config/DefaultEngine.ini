; DefaultEngine.ini — key flags for Peddle a Bike Away
; Missing these causes hard-to-debug launch issues

[/Script/Engine.RendererSettings]
; Lumen global illumination — atmospheric cliff face lighting
r.DynamicGlobalIlluminationMethod=1
; Lumen reflections
r.ReflectionMethod=1
; Virtual Shadow Maps — pairs with Lumen
r.Shadow.Virtual.Enable=1

[/Script/Engine.PhysicsSettings]
; Chaos Physics solver — required for ragdoll + bike frame separation
PhysicErrorCorrection=(PingExtrapolation=0.100000,PingLimit=100.000000,ErrorPerLinearDiff=1.000000,ErrorPerAngularDiff=0.000000,MaxRestorationTime=1.000000,ErrorAccumulationSeconds=1.000000,ErrorAccumulationDistanceSq=625.000000,ErrorAccumulationSimilarity=0.500000,PositionLerpRate=0.200000,AngleLerpRate=0.200000,LinearVelocityCoefficient=0.200000,AngularVelocityCoefficient=0.200000,ErrorCorrectionDuration=1.000000)

; Substepping improves stability of ragdoll physics at high framerates
bSubstepping=True
MaxSubstepDeltaTime=0.016667
MaxSubsteps=6

[/Script/Engine.GameMapsSettings]
; Set your default game mode here once BP_CyclistGameMode is created
; GlobalDefaultGameMode=/Game/Blueprints/BP_CyclistGameMode.BP_CyclistGameMode_C

[/Script/Engine.InputSettings]
; Required for Enhanced Input System
+ActionMappings=(ActionName="PedalLeft",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Q)
+ActionMappings=(ActionName="PedalRight",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=E)

[ConsoleVariables]
; Show Physics Asset debug overlay in PIE — helps tune damping values
; Uncomment during Week 2-3 playtesting:
; p.PhysicsAsset.Debug=1

